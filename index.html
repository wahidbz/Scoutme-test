<head>
  <meta charset="utf-8" />

  <style>
    /* ===========================
       Variables & base
       =========================== */
    :root{
      --bg1: #04110a;
      --bg2: #07140b;
      --card: rgba(255,255,255,0.03);
      --glass: rgba(255,255,255,0.04);
      --accent:#18b63b;
      --accent-2:#d4b24a;
      --muted:#9aa8a0;
      --text:#eaf8ee;
      --radius:14px;
      --trans:260ms cubic-bezier(.2,.9,.2,1);
      --soft: rgba(255,255,255,0.02);
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:Inter,Segoe UI,Tahoma,Arial,sans-serif;background:linear-gradient(180deg,var(--bg1),var(--bg2));color:var(--text);-webkit-font-smoothing:antialiased}
    a{color:var(--accent)} img{max-width:100%;display:block}
    .wrap{max-width:1200px;margin:8px auto;padding:14px}
    header{display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:10px;z-index:1200;background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:10px 12px;-webkit-backdrop-filter: blur(10px);backdrop-filter: blur(10px)}
    #logo-box{width:68px;height:68px;border-radius:12px;background:linear-gradient(90deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 6px 20px rgba(8,12,8,0.6)}
    #logo-box img{width:100%;height:100%;object-fit:contain;display:block}
    #brand{flex:1;min-width:0}
    .lang-select{display:flex;gap:6px}
    .lang-select button{background:transparent;border:1px solid rgba(255,255,255,0.04);padding:6px 10px;border-radius:8px;color:var(--muted);cursor:pointer}
    .lang-select button.active{background:rgba(24,182,59,0.12);color:#fff;box-shadow:0 6px 18px rgba(24,182,59,0.06)}
    .lang-toggle{background:transparent;border:1px solid rgba(255,255,255,0.08);padding:8px 12px;border-radius:12px;color:#fff;cursor:pointer;font-weight:800;letter-spacing:0.6px}
    main{display:grid;grid-template-columns:1fr;gap:12px;margin-top:12px}
    aside.sidebar{background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.02));padding:12px;border-radius:12px;min-height:520px;border:1px solid rgba(255,255,255,0.02)}
    .navbtn{display:block;width:100%;text-align:right;padding:10px;border-radius:10px;border:0;background:transparent;color:var(--muted);cursor:pointer;margin-bottom:6px;transition:var(--trans)}
    .navbtn:hover{transform:translateX(-6px);color:#fff}
    .navbtn.active{background:linear-gradient(90deg, rgba(24,182,59,0.12), rgba(212,178,74,0.03));color:#fff}
    .content{background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent);padding:18px;padding-bottom:120px;border-radius:12px;min-height:72vh;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,0.02)}
    .card{background:rgba(255,255,255,0.02);padding:12px;border-radius:12px;margin-bottom:12px;-webkit-backdrop-filter: blur(4px);backdrop-filter: blur(4px)}
    .btn{background:var(--accent);border:0;padding:8px 12px;border-radius:10px;color:#02120a;font-weight:700;cursor:pointer;box-shadow:0 8px 22px rgba(24,182,59,0.06)}
    .btn.ghost{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted)}
    input,select,textarea{width:100%;padding:10px;border-radius:10px;border:0;background:rgba(255,255,255,0.02);color:var(--text);margin-top:8px}
    .list{margin-top:10px}
    .item{display:flex;gap:10px;align-items:center;padding:10px;background:rgba(0,0,0,0.12);border-radius:10px;margin-bottom:8px;transition:var(--trans);align-items:center}
    .item:hover{transform:translateX(-6px)}
    .avatar{width:64px;height:64px;border-radius:10px;background:linear-gradient(90deg,#123,#234);flex-shrink:0;overflow:hidden}
    .avatar img{width:100%;height:100%;object-fit:cover}
    .muted{color:var(--muted);font-size:13px}
    .wrap-anywhere{overflow-wrap:anywhere;word-break:break-word;max-width:100%}
    .two{display:flex;gap:8px}
    footer{margin-top:10px;color:var(--muted);text-align:center;font-size:13px}
    @media(max-width:980px){main{grid-template-columns:1fr} aside.sidebar{order:2} .content{padding-bottom:120px} header{top:0;border-radius:0}}
    @media(max-width:520px){
      header{flex-wrap:nowrap;gap:8px;padding:8px 10px}
      #logo-box{width:52px;height:52px}
      #brand{overflow:hidden}
      #brand > div{min-width:0}
      #app-title{font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      #app-sub{display:none}
      #current-page-name{display:none}
      .lang-toggle{padding:7px 10px;border-radius:10px}
      #user-action{max-width:140px;overflow:hidden}
      #user-action > div{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      #user-action .muted{display:none}
      #logoutBtn,#regBtn{padding:6px 8px;font-size:12px}
    }

    /* ===========================
       زر AFCON Live Hub
       =========================== */

    /* ===========================
       Background animated elements
       =========================== */
    .bg-layer{position:absolute;inset:0;pointer-events:none;z-index:0}
    .bg-blob{position:absolute;width:600px;height:600px;border-radius:50%;filter:blur(80px);opacity:0.08;animation:float 10s ease-in-out infinite}
    .bg-blob.b1{background:linear-gradient(90deg,var(--accent),var(--accent-2));left:-120px;top:-180px;transform:scale(1)} 
    .bg-blob.b2{background:linear-gradient(90deg,#2e86a6,#7ed6df);right:-120px;bottom:-200px;animation-duration:14s}
    @keyframes float{0%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(18px) rotate(12deg)}100%{transform:translateY(0) rotate(0deg)}}

    /* page card header shimmer */
    .card h3{margin:0 0 6px 0}
    .muted-2{color:#cfe9d2;font-size:13px}
    .badge{background:rgba(255,255,255,0.03);padding:6px 8px;border-radius:999px;font-size:13px}

    /* bottom nav */
    .mobile-nav{position:fixed;left:50%;transform:translateX(-50%);bottom:12px;z-index:9999;width:min(520px, calc(100vw - 24px));padding:8px;background:rgba(0,0,0,0.42);border:1px solid rgba(255,255,255,0.06);border-radius:999px;-webkit-backdrop-filter: blur(10px);backdrop-filter: blur(10px);display:flex;gap:6px;align-items:center;justify-content:space-between}
    .mobile-nav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-width:0;background:transparent;border:0;color:rgba(255,255,255,0.82);padding:8px 8px;border-radius:999px;cursor:pointer;transition:var(--trans)}
    .mobile-nav button .mi{font-size:18px;line-height:1}
    .mobile-nav button .ml{font-size:11px;line-height:1;color:rgba(255,255,255,0.65);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
    .mobile-nav button.active{background:linear-gradient(90deg, rgba(24,182,59,0.22), rgba(212,178,74,0.10));color:#fff;box-shadow:0 10px 24px rgba(0,0,0,0.28)}

    /* registration overlay */
    #reg-overlay{position:fixed;inset:0;background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.7));display:flex;align-items:center;justify-content:center;z-index:9999}

    #reg-card h2{margin:0 0 8px 0;font-size:20px}
    #reg-card p{color:var(--muted);font-size:14px;margin-bottom:12px}
    .reg-row{display:flex;gap:8px}
    .reg-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}

    .kpi .chip{background:rgba(255,255,255,0.02);padding:6px 8px;border-radius:8px;font-size:13px;color:var(--muted)}
    .big-img{width:220px;height:140px;border-radius:10px;overflow:hidden}
    .big-img img{width:100%;height:100%;object-fit:cover}

    /* focus */
    button:focus,input:focus,select:focus,textarea:focus{outline:2px solid rgba(24,182,59,0.18)}

    .fade-enter{opacity:0;transform:translateY(6px);transition:opacity 260ms ease, transform 260ms ease}
    .fade-enter-active{opacity:1;transform:translateY(0)}

    /* LTR adjustments when language is EN/FR */
    [dir="ltr"] .navbtn{text-align:left}

    [dir="rtl"] .mobile-nav{direction:ltr}

<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>
  // تهيئة Pi SDK (مرة واحدة فقط)
  try {
    const params = new URLSearchParams(window.location.search || '');
    const sandboxParam = params.get('sandbox');
    const prodParam = params.get('prod');

    if (sandboxParam === '1') localStorage.setItem('PI_SANDBOX', '1');
    if (prodParam === '1') localStorage.setItem('PI_SANDBOX', '0');

    const persistedSandbox = localStorage.getItem('PI_SANDBOX') === '1';
    const hostSandbox = String(window.location.hostname || '').toLowerCase().includes('sandbox.minepi.com');
    const refSandbox = String(document.referrer || '').toLowerCase().includes('sandbox.minepi.com');
    let ancestorSandbox = false;
    try {
      const origins = window.location.ancestorOrigins;
      if (origins && typeof origins.length === 'number') {
        for (let i = 0; i < origins.length; i++) {
          if (String(origins[i] || '').toLowerCase().includes('sandbox.minepi.com')) {
            ancestorSandbox = false;
            break;
          }
        }
      }
    } catch (e) {}

    let inIframe = false;
    try { inIframe = window.self !== window.top; } catch (e) { inIframe = true; }

    const useSandbox =
      sandboxParam === '1' ||
      (sandboxParam !== '0' && (persistedSandbox || hostSandbox || (inIframe && (refSandbox || ancestorSandbox))));

    if (window.Pi && typeof window.Pi.init === 'function') {
      window.Pi.init({ version: "2.0", sandbox: useSandbox });
    }
  } catch (e) {
    try { console.warn('Pi.init failed', e); } catch (_) {}
  }
</script>

  async function piSignIn(){
    try{
      if(isPiSdkAvailable()){
        if(!__piInitDone && typeof window.Pi.init === 'function'){
          __piInitDone = true;
          try{ window.Pi.init({ version: "2.0", sandbox: false }); } catch(e){}

        const auth = await window.Pi.authenticate(["username","payments"], (payment)=>{
          try{ console.log('onIncompletePaymentFound', payment); } catch(e){}
        });
        const accessToken = auth?.accessToken || auth?.access_token || '';
        const username = String(auth?.user?.username || auth?.username || auth?.user?.name || '').trim();
        if(!username){
          throw new Error('Pi did not return a username. Please try again.');
        }
        if(accessToken){
          localStorage.setItem('PI_ACCESS_TOKEN', accessToken);
        }
        const piUser = { id: uid('me'), name: username, email:'', wallet:'', sports:[], country:'' };

        } catch(e){}
        // Reload ensures the UI reads the saved session even if initApp wiring changes
        try{ window.location.reload(); } catch(e){}
        return;
      }
    } catch(err){
      console.error('Pi sign-in failed:', err);
      try{
        alert('فشل تسجيل الدخول عبر Pi: ' + (err && err.message ? err.message : 'Unknown error'));

  async function payWithPi(amount){
    try{
      if(!isPiSdkAvailable()){
        alert('Pi Browser غير متوفر. خاصك تفتح الموقع من داخل Pi Browser.');
        return;
      }

      // Always ensure current session has payments scope (required by Pi.createPayment)
      let accessToken = localStorage.getItem('PI_ACCESS_TOKEN') || '';
      try{
        const auth = await window.Pi.authenticate(["payments"], (payment)=>{
          try{ console.log('onIncompletePaymentFound', payment); } catch(e){}
        });
        const newToken = auth?.accessToken || auth?.access_token || '';
        if(newToken){
          accessToken = newToken;
          localStorage.setItem('PI_ACCESS_TOKEN', accessToken);
        }
      } catch(e){
        // user denied/cancelled payments scope
        alert('خاصك تعطي صلاحية payments باش نقدروا نديروا الدفع.');
        return;
      }

      const allowedAmounts = [0.5, 1, 2];
      const rawAmount = (typeof amount !== 'undefined' && amount !== null)
        ? amount
        : (document.getElementById('piPayAmount') ? document.getElementById('piPayAmount').value : 1);
      const selectedAmount = Number(rawAmount);
      if(!Number.isFinite(selectedAmount) || !allowedAmounts.includes(selectedAmount)){
        alert('المرجو اختيار مبلغ صحيح (0.5 / 1 / 2 Pi).');
        return;
      }

      const paymentData = {
        amount: selectedAmount,
        memo: 'ScoutMe — Profile Payment',
        metadata: { source: 'profile', kind: 'tip', amount: selectedAmount }
      };

      const paymentCallbacks = {
        onReadyForServerApproval: async (paymentDTO) => {
          const paymentId =
            (typeof paymentDTO === 'string' ? paymentDTO : null) ||
            paymentDTO?.identifier ||
            paymentDTO?.paymentId ||
            paymentDTO?.id ||
            paymentDTO?.payment_id;
          const resp = await fetch('/.netlify/functions/pi-approve', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paymentId, accessToken, paymentDTO })
          });
          if(!resp.ok){
            const text = await resp.text().catch(()=> '');
            console.error('pi-approve failed', resp.status, text);
            throw new Error('pi-approve failed: ' + resp.status);
          }
        },
        onReadyForServerCompletion: async (paymentDTO, txid) => {
          const paymentId =
            (typeof paymentDTO === 'string' ? paymentDTO : null) ||
            paymentDTO?.identifier ||
            paymentDTO?.paymentId ||
            paymentDTO?.id ||
            paymentDTO?.payment_id;
          const resp = await fetch('/.netlify/functions/pi-complete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paymentId, txid, accessToken, paymentDTO })
          });
          if(!resp.ok){
            const text = await resp.text().catch(()=> '');
            console.error('pi-complete failed', resp.status, text);
            throw new Error('pi-complete failed: ' + resp.status);
          }
          alert('✅ تم الدفع بنجاح');
        },
        onCancel: async (paymentDTO) => {
          try{
            const paymentId =
              (typeof paymentDTO === 'string' ? paymentDTO : null) ||
              paymentDTO?.identifier ||
              paymentDTO?.paymentId ||
              paymentDTO?.id ||
              paymentDTO?.payment_id;
            const resp = await fetch('/.netlify/functions/pi-cancel', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ paymentId, paymentDTO })
            });
            if(!resp.ok){
              const text = await resp.text().catch(()=> '');
              console.error('pi-cancel failed', resp.status, text);
            }
          } catch(e){}
          alert('تم إلغاء العملية');
        },
        onError: (err) => {
          console.error('Payment error:', err);
          alert('❌ وقع خطأ فالدفع');
        },
        onIncompletePaymentFound: async (paymentDTO) => {
          try{
            const paymentId =
              (typeof paymentDTO === 'string' ? paymentDTO : null) ||
              paymentDTO?.identifier ||
              paymentDTO?.paymentId ||
              paymentDTO?.id ||
              paymentDTO?.payment_id;
            const txid = paymentDTO?.transaction?.txid;
            if(paymentId && txid){
              const resp = await fetch('/.netlify/functions/pi-complete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ paymentId, txid, accessToken, paymentDTO })
              });
              if(!resp.ok){
                const text = await resp.text().catch(()=> '');
                console.error('pi-complete (incomplete) failed', resp.status, text);
              }
            }
          } catch(e){}
        }
      };

      window.Pi.createPayment(paymentData, paymentCallbacks);
    } catch(err){
      console.error(err);
      alert('❌ وقع خطأ غير متوقع');
    }
  }
  window.payWithPi = payWithPi;

  // ----- Wallet helpers (simulated) -----
  function copyAddress(){
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(APP_ADDRESS).then(()=> alert(t('address_copied'))).catch(()=> prompt(t('copy_address')+':', APP_ADDRESS));
      return;
    }
    prompt(t('copy_address')+':', APP_ADDRESS);
  }
  function toggleNetwork(){
    const w = JSON.parse(localStorage.getItem(STORAGE.WALLET) || '{}');
    w.network = w.network === 'mainnet' ? 'testnet' : 'mainnet';
    localStorage.setItem(STORAGE.WALLET, JSON.stringify(w));
    showPage('wallet');
    alert(t('network_switched') + ' ' + w.network);
  }
  function doSend(){
    const to = document.getElementById('send_to').value.trim();
    const amt = parseFloat(document.getElementById('send_amt').value);
    if(!to || !amt) return alert(t('enter_address_amount'));
    const w = JSON.parse(localStorage.getItem(STORAGE.WALLET) || '{}');
    if(amt > (w.balance||0)) return alert(t('insufficient_balance'));
    if(PI_API_KEY){
      console.log('PI_API_KEY present client-side — recommend using serverless function instead for security.');
    }
    w.balance = +( (w.balance||0) - amt ).toFixed(6);
    localStorage.setItem(STORAGE.WALLET, JSON.stringify(w));
    const txs = JSON.parse(localStorage.getItem(STORAGE.TXS) || '[]');
    txs.push({id:uid('tx'), when:new Date().toLocaleString(), type:'send', amount:amt, to});
    localStorage.setItem(STORAGE.TXS, JSON.stringify(txs));
    showPage('wallet');
    alert(t('sent_simulated'));
  }
  function renderTxs(){
    const txs = JSON.parse(localStorage.getItem(STORAGE.TXS) || '[]');
    const el = document.getElementById('txs');
    if(!el) return;
    el.innerHTML = txs.slice().reverse().map(t=> `<div class="card" style="padding:8px;margin-bottom:6px">${t.when} • ${t.type} • ${t.amount} Pi • ${t.to||t.details||''}</div>`).join('') || `<div class="muted">${t('no_transactions')}</div>`;
  }

  function applyFilter(){

  function renderDiscover(sport='',country=''){
    const players = JSON.parse(localStorage.getItem(STORAGE.PLAYERS) || '[]');
    const results = document.getElementById('discover-results');
    const filtered = players.filter(p=>{
      if(sport && !( (p.sports||[]).join(' ').includes(sport) || (p.sport||'').includes(sport) )) return false;
      if(country && !(p.country||'').toLowerCase().includes(country.toLowerCase())) return false;
      return true;
    });
    results.innerHTML = `<div class="card"><h4>${t('players')}</h4>` + (filtered.length? filtered.map(p=>{
      const imgSrc = findPlayerImageByName(p.name);
      return `<div class="item"><div class="avatar">${imgSrc?`<img src="${imgSrc}" alt="${p.name}">`:''}</div><div style="flex:1;text-align:right"><strong>${p.name}</strong><div class="muted">${(p.sports||p.sport||[]).join ? (p.sports||p.sport||[]).join(', '):p.sport} • ${p.country||''}</div></div><div><button class="btn" onclick="viewPlayer('${p.id}')">${t('view')}</button></div></div>`;
    }).join('') : `<div class="muted">${t('no_results')}</div>`) + `</div>`;
  }

  // ----- Player view & interactions -----
  function viewPlayer(id){
    const players = JSON.parse(localStorage.getItem(STORAGE.PLAYERS) || '[]');
    const p = players.find(x=>x.id===id);
    if(!p) return alert(t('player_not_found'));
    const imgSrc = findPlayerImageByName(p.name);
    const content = document.getElementById('content');
    content.innerHTML = `<div class="card" style="display:flex;gap:12px;align-items:center"><div style="width:180px;height:140px;border-radius:12px;overflow:hidden">${imgSrc?`<img src="${imgSrc}" style="width:100%;height:100%;object-fit:cover">`:`<div style="width:100%;height:100%;background:rgba(255,255,255,0.02);display:flex;align-items:center;justify-content:center" class="muted">${t('no_image')}</div>`}</div><div style="flex:1;text-align:right"><h3>${p.name}</h3><div class="muted">${(p.sports||[]).join(', ')} • ${p.country||''}</div><p>${t('age')}: ${p.age||'-'} • ${t('exp')}: ${p.exp||'-'}</p>${p.video?`<p><button class="btn" onclick="window.open('${p.video}','_blank')">🎬 ${t('video')}</button></p>`:''}<p style="margin-top:8px"><button class="btn" onclick="requestContact('${p.id}')">${t('request_contact')}</button></p><p style="margin-top:8px"><button class="btn ghost" onclick="showPage('discover')">${t('back')}</button></p></div></div>`;
  }

  async function requestContact(playerId){
    const feePct = Number(localStorage.getItem(STORAGE.APP_FEE) || 10);
    const w = JSON.parse(localStorage.getItem(STORAGE.WALLET) || '{}');
    const ask = confirm(t('pay_contact_prompt').replace('{fee}', feePct));
    if(!ask) return;
    if((w.balance||0) < 1) return alert(t('insufficient_balance'));
    w.balance = +( (w.balance||0) - 1 ).toFixed(6);
    localStorage.setItem(STORAGE.WALLET, JSON.stringify(w));
    const txs = JSON.parse(localStorage.getItem(STORAGE.TXS) || '[]');
    txs.push({id:uid('tx'), when:new Date().toLocaleString(), type:'contact_fee', amount:1, details:`for player ${playerId}`});
    localStorage.setItem(STORAGE.TXS, JSON.stringify(txs));
    alert(t('contact_paid'));
    showPage('discover');
  }

  // ----- Add navigation for add-ons in bottom nav (if present) -----
  function addBottomNavExtra(){
    const bottomNav = document.getElementById('bottomNav');
    if(bottomNav){
      const extras = ['teamtokens','nftplayers','marketplace'];
      extras.forEach(ep=>{
        if(!Array.from(bottomNav.children).some(btn=>btn.title===ep)){
          const btn = document.createElement('button');
          btn.textContent = ep==='teamtokens'?'🪙':ep==='nftplayers'?'🎨':'🌐';
          btn.title = ep;
          btn.onclick = ()=> showPage(ep);
          bottomNav.appendChild(btn);
        }
      });
    }
  }

  // ----- Add-on actions: buy token, view/buy NFT, visit store -----
  function buyToken(id){
    const tokens = JSON.parse(localStorage.getItem('sm_team_tokens')||'[]');
    const tok = tokens.find(t=>t.id===id);
    if(!tok) return alert(t('token_not_found'));
    const w = JSON.parse(localStorage.getItem(STORAGE.WALLET) || '{}');
    if((w.balance||0) < tok.price) return alert(t('insufficient_balance'));
    if(!confirm(t('buy_token_confirm').replace('{team}', tok.team).replace('{price}', tok.price))) return;
    w.balance = +( (w.balance||0) - tok.price ).toFixed(6);
    localStorage.setItem(STORAGE.WALLET, JSON.stringify(w));
    const txs = JSON.parse(localStorage.getItem(STORAGE.TXS) || '[]');
    txs.push({id:uid('tx'), when:new Date().toLocaleString(), type:'buy_token', amount:tok.price, details:tok.team});
    localStorage.setItem(STORAGE.TXS, JSON.stringify(txs));
    alert(t('purchased_simulated'));
    showPage('teamtokens');
  }

  function viewNFT(id){
    const nfts = JSON.parse(localStorage.getItem('sm_nft_players')||'[]');
    const n = nfts.find(x=>x.id===id);
    if(!n) return alert(t('not_found'));
    document.getElementById('content').innerHTML = `<div class="card" style="display:flex;gap:12px;align-items:center"><div style="width:220px;height:140px;border-radius:12px;overflow:hidden"><img src="${n.image}" style="width:100%;height:100%;object-fit:cover"></div><div style="flex:1;text-align:right"><h3>${n.name}</h3><div class="muted">${n.team}</div><p class="muted">${t('value')}: ${n.value} Pi</p><div style="margin-top:8px"><button class="btn" onclick="buyNFT('${n.id}')">${t('buy_nft')}</button> <button class="btn ghost" onclick="showPage('nftplayers')">${t('back')}</button></div></div></div>`;
  }

  function buyNFT(id){
    const nfts = JSON.parse(localStorage.getItem('sm_nft_players')||'[]');
    const nft = nfts.find(n=>n.id===id);
    if(!nft) return alert(t('not_found'));
    const w = JSON.parse(localStorage.getItem(STORAGE.WALLET) || '{}');
    if((w.balance||0) < nft.value) return alert(t('insufficient_balance'));
    if(!confirm(t('buy_nft_confirm').replace('{name}', nft.name).replace('{price}', nft.value))) return;
    w.balance = +( (w.balance||0) - nft.value ).toFixed(6);
    localStorage.setItem(STORAGE.WALLET, JSON.stringify(w));
    const txs = JSON.parse(localStorage.getItem(STORAGE.TXS) || '[]');
    txs.push({id:uid('tx'), when:new Date().toLocaleString(), type:'buy_nft', amount:nft.value, details:nft.name});
    localStorage.setItem(STORAGE.TXS, JSON.stringify(txs));
    alert(t('nft_purchased_simulated'));
    showPage('nftplayers');
  }

  function visitStore(id){
    const stores = JSON.parse(localStorage.getItem('sm_stores')||'[]');
    const s = stores.find(x=>x.id===id);
    if(!s) return alert(t('store_not_found'));
    // show store page with description and "how integrate" block
    document.getElementById('content').innerHTML = `<div class="card"><div style="display:flex;gap:12px;align-items:center"><div class="big-img"><img src="${s.image}" alt="${s.name}"></div><div style="flex:1;text-align:right"><h3>${s.name}</h3><div class="muted">${s.short||''}</div></div></div><div class="store-details"><h4>${t('how_integrates')}</h4><p class="muted">${s.details||t('description_not_available')}</p><div class="kpi"><div class="chip">شراكة متاجر Pi</div><div class="chip">قبول Pi</div><div class="chip">دمج منتجات/خدمات</div></div><div style="margin-top:10px"><button class="btn" onclick="showPage('marketplace')">${t('back')}</button></div></div></div>`;
  }

  function openCAF(){
    const url = 'https://www.cafonline.com/';
    try{
      const w = window.open(url, '_blank', 'noopener,noreferrer');
      if(!w) window.location.href = url;
    } catch(e){
      window.location.href = url;
    }
  }

  // ----- Utility: find player images by name (mapping) -----
  function findPlayerImageByName(name){
    if(!name) return null;
    const mapping = {
      'cristiano': `${BASE_IMG}/players/player_cristiano_ronaldo.png`,
      'ronaldo': `${BASE_IMG}/players/player_cristiano_ronaldo.png`,
      'messi': `${BASE_IMG}/players/player_lionel_messi.png`,
      'salah': `${BASE_IMG}/players/player_mohamed_salah.png`,
      'neymar': `${BASE_IMG}/players/player_neymar_jr.png`,
      'mbappe': `${BASE_IMG}/players/player_kylian_mbappe.png`,
      'haaland': `${BASE_IMG}/players/player_erling_haaland.png`,
      'lewandowski': `${BASE_IMG}/players/player_robert_lewandowski.png`,
      'de_bruyne': `${BASE_IMG}/players/player_kevin_de_bruyne.png`,
      'benzema': `${BASE_IMG}/players/player_karim_benzema.png`,
      'sadio': `${BASE_IMG}/players/player_sadio_mane.png`
    };
    const key = name.toLowerCase().replace(/\s+/g,'_');
    for(const k in mapping){
      if(name.toLowerCase().includes(k) || key.includes(k)) return mapping[k];
    }
    return null;
  }

  function escapeHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function ensureImageErrorHandler(){
    if(window.__sm_img_err_handler_added) return;
    window.__sm_img_err_handler_added = true;
    document.addEventListener('error', (e)=>{
      const t = e.target;
      if(t && t.tagName === 'IMG'){
        t.style.display = 'none';
      }
    }, true);
  }

  // ----- Init App -----
  function initApp(){
    if(!localStorage.getItem(STORAGE.LANG)) localStorage.setItem(STORAGE.LANG,'ar');
    ensureImageErrorHandler();
    renderLang();
    updateUserAction();
    showRegOverlay();
    showPage(currentPage);
    // add bottom extra buttons after DOM ready
    setTimeout(addBottomNavExtra, 300);
  }
  initApp();

  </script>
